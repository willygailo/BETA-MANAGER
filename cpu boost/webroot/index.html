<!DOCTYPE html>
<html>
<head>
    <title>CPU Booster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0D14;
            color: #E8E8F0;
            font-family: 'Courier New', monospace;
            padding: 16px;
            text-align: center;
        }
        h1 { color: #00E5FF; font-size: 22px; margin: 16px 0; }
        .badge {
            display: inline-block;
            background: #00E676;
            color: #0D0D14;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .card {
            background: #1A1A26;
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
        }
        .row {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
        }
        .stat {
            padding: 12px;
            background: #252536;
            border-radius: 8px;
            min-width: 90px;
            flex: 1;
            margin: 0 4px;
        }
        .val { color: #00E5FF; font-size: 20px; font-weight: bold; }
        .lbl { color: #6E6E8A; font-size: 10px; margin-top: 4px; text-transform: uppercase; }
        button {
            background: linear-gradient(135deg, #00E5FF, #7C4DFF);
            color: #fff;
            border: none;
            padding: 14px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 48%;
            margin: 4px 1%;
        }
        button:active { opacity: 0.8; }
        .btn-outline {
            background: transparent;
            border: 1px solid #00E5FF;
            color: #00E5FF;
        }
        pre {
            background: #0D0D14;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            font-size: 11px;
            color: #9E9EB8;
            margin-top: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1E1E30;
        }
        .switch-row:last-child { border: none; }
        .toggle {
            width: 44px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
        }
        .toggle.on { background: #00E676; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle.on::after { left: 22px; }
    </style>
</head>
<body>
    <h1>⚡ CPU BOOSTER</h1>
    <span class="badge">● ACTIVE</span>

    <div class="card">
        <div class="row">
            <div class="stat"><div class="val" id="cpuStat">--</div><div class="lbl">CPU</div></div>
            <div class="stat"><div class="val" id="gpuStat">--</div><div class="lbl">GPU</div></div>
            <div class="stat"><div class="val" id="tempStat">--</div><div class="lbl">TEMP</div></div>
        </div>
    </div>

    <div class="card">
        <div class="switch-row">
            <span>CPU Performance</span>
            <div class="toggle on" id="cpuToggle" onclick="toggleCpu()"></div>
        </div>
        <div class="switch-row">
            <span>GPU Boost</span>
            <div class="toggle on" id="gpuToggle" onclick="toggleGpu()"></div>
        </div>
        <div class="switch-row">
            <span>Memory Optimize</span>
            <div class="toggle on" id="memToggle" onclick="toggleMem()"></div>
        </div>
        <div class="switch-row">
            <span>Thermal Control</span>
            <div class="toggle on" id="thmToggle" onclick="toggleThermal()"></div>
        </div>
    </div>

    <div>
        <button onclick="applyAll()">APPLY ALL</button>
        <button class="btn-outline" onclick="getStatus()">STATUS</button>
    </div>

    <pre id="output">Ready.</pre>

    <script>
        let state = { cpu: true, gpu: true, mem: true, thermal: true };

        function log(msg) {
            const out = document.getElementById('output');
            out.textContent = msg + '\n' + out.textContent;
        }

        function toggleCpu() {
            state.cpu = !state.cpu;
            document.getElementById('cpuToggle').className = 'toggle' + (state.cpu ? ' on' : '');
            const cmd = state.cpu
                ? 'for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do echo performance > $cpu 2>/dev/null; done'
                : 'for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do echo schedutil > $cpu 2>/dev/null; done';
            const r = ksu.exec(cmd);
            log('CPU ' + (state.cpu ? 'ON' : 'OFF'));
        }

        function toggleGpu() {
            state.gpu = !state.gpu;
            document.getElementById('gpuToggle').className = 'toggle' + (state.gpu ? ' on' : '');
            const cmd = state.gpu
                ? 'echo 1 > /sys/class/kgsl/kgsl-3d0/force_bus_on 2>/dev/null; echo 1 > /sys/class/kgsl/kgsl-3d0/force_clk_on 2>/dev/null'
                : 'echo 0 > /sys/class/kgsl/kgsl-3d0/force_bus_on 2>/dev/null; echo 0 > /sys/class/kgsl/kgsl-3d0/force_clk_on 2>/dev/null';
            ksu.exec(cmd);
            log('GPU ' + (state.gpu ? 'ON' : 'OFF'));
        }

        function toggleMem() {
            state.mem = !state.mem;
            document.getElementById('memToggle').className = 'toggle' + (state.mem ? ' on' : '');
            const cmd = state.mem
                ? 'echo 0 > /proc/sys/vm/swappiness 2>/dev/null; echo 1 > /proc/sys/vm/compact_memory 2>/dev/null'
                : 'echo 60 > /proc/sys/vm/swappiness 2>/dev/null';
            ksu.exec(cmd);
            log('Memory ' + (state.mem ? 'ON' : 'OFF'));
        }

        function toggleThermal() {
            state.thermal = !state.thermal;
            document.getElementById('thmToggle').className = 'toggle' + (state.thermal ? ' on' : '');
            const cmd = state.thermal
                ? 'echo disabled > /sys/class/thermal/thermal_message/sconfig 2>/dev/null'
                : 'echo enabled > /sys/class/thermal/thermal_message/sconfig 2>/dev/null';
            ksu.exec(cmd);
            log('Thermal ' + (state.thermal ? 'OFF (boost)' : 'ON (stock)'));
        }

        function applyAll() {
            log('Applying all tweaks...');
            for (const key in state) state[key] = true;
            ['cpuToggle','gpuToggle','memToggle','thmToggle'].forEach(function(id) {
                document.getElementById(id).className = 'toggle on';
            });
            const r = ksu.exec(
                'for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do echo performance > $cpu 2>/dev/null; done; ' +
                'echo 1 > /sys/class/kgsl/kgsl-3d0/force_bus_on 2>/dev/null; echo 1 > /sys/class/kgsl/kgsl-3d0/force_clk_on 2>/dev/null; ' +
                'echo 0 > /sys/class/kgsl/kgsl-3d0/max_pwrlevel 2>/dev/null; ' +
                'echo 0 > /proc/sys/vm/swappiness 2>/dev/null; echo 1 > /proc/sys/vm/compact_memory 2>/dev/null; ' +
                'echo disabled > /sys/class/thermal/thermal_message/sconfig 2>/dev/null'
            );
            log(r || 'All tweaks applied!');
            ksu.toast('CPU Booster: All applied!');
            getStatus();
        }

        function getStatus() {
            const gov = ksu.exec("cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo 'N/A'");
            const gpu = ksu.exec("cat /sys/class/kgsl/kgsl-3d0/force_bus_on 2>/dev/null || echo '0'");
            const temp = ksu.exec("cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || echo '0'");

            document.getElementById('cpuStat').textContent = gov.trim() === 'performance' ? 'PERF' : gov.trim().substring(0,4).toUpperCase();
            document.getElementById('gpuStat').textContent = gpu.trim() === '1' ? 'BOOST' : 'NORM';
            const t = parseInt(temp.trim());
            document.getElementById('tempStat').textContent = (t > 0 ? Math.floor(t/1000) : '--') + '°';
        }

        // Auto-refresh status every 5s
        setInterval(getStatus, 5000);
        getStatus();
    </script>
</body>
</html>
